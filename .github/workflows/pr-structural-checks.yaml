# Structural PR checks (commit lint, PR title/body validation) consolidated into
# a single workflow so branch protection can require ONE rollup gate
# (`PR Structural Checks Success`) instead of every individual structural
# context. The package/CI build check leaves stay individual on purpose — only
# these structural, PR-metadata checks are aggregated here.
#
# External app checks (DCO, dpulls, mergefreeze) are separate status contexts
# emitted by GitHub Apps and cannot be pulled into a workflow's `needs` graph;
# they remain standalone required checks.
name: "PR Structural Checks"

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read

jobs:
  commitlint:
    name: Commit Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 #v7.0.1
        with:
          fetch-depth: 0

      - name: Display commit messages with line details
        run: |
          echo "📝 Analyzing commit messages..."
          echo "================================"
          git log --format=%H origin/main..HEAD | while read -r hash; do
            echo ""
            echo "Commit: ${hash}"
            echo "--------------------------------"
            git log --format=%B -n 1 "${hash}" | awk '{printf "%3d [%3d chars] %s\n", NR, length($0), $0}'
            echo "--------------------------------"
          done

      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed #v6.2.1
        with:
          configFile: commitlint.config.mjs
          failOnWarnings: false
          failOnErrors: true
          helpURL: 'https://github.com/conventional-changelog/commitlint/#what-is-commitlint'
        env:
          VERBOSE: true

  validate-pr-title:
    name: Validate PR title
    runs-on: ubuntu-22.04
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 #v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-title-match:
    name: Validate PR title match with latest commit message
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 #v7.0.1
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify PR Title Matches Latest Commit
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          LATEST_COMMIT_MSG=$(git log -1 --pretty=%s)

          echo "PR Title: '$PR_TITLE'"
          echo "Latest Commit Message: '$LATEST_COMMIT_MSG'"

          if [ "$PR_TITLE" != "$LATEST_COMMIT_MSG" ]; then
            echo "❌ ERROR: PR Title does not match your latest commit message!"
            echo "Your PR Title must match your Git commit message exactly."
            echo "To fix this, either rename your PR title on GitHub, or run:"
            echo "  git commit --amend -m \"$PR_TITLE\" && git push --force"
            exit 1
          fi
          echo "✅ PR Title matches the latest commit message."

  validate-type:
    name: Validate PR Type
    runs-on: ubuntu-latest
    steps:
      - name: Get Changed Files
        id: file-list
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --json files --jq '.files[].path' > changed_files.txt
          echo "Files changed:"
          cat changed_files.txt

      - name: Validate PR Title Prefix
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PR_TYPE=$(echo "$PR_TITLE" | sed -E 's/^([a-z]+)(\(.*\))?:.*/\1/')

          # Release PRs follow a fixed pattern and bypass classification
          if echo "$PR_TITLE" | grep -Eq '^chore\(release\):'; then
            echo "✅ Release commit detected — skipping classification."
            exit 0
          fi

          CHANGELOG_TYPES="feat fix refactor build perf"
          NON_CHANGELOG_TYPES="ci test chore docs style refactor build"

          HAS_CORE_CODE=false
          HAS_DEP_MANIFEST=false
          while IFS= read -r file; do
            [ -z "$file" ] && continue

            # Non-core paths — never count as core regardless of extension.
            # Workflow/action files under .github/ are handled by the dep-manifest
            # classifier below (they pin action versions), so let them through.
            case "$file" in
              .github/workflows/*|.github/actions/*) ;;
              .github/*|docs/*|*/docs/*|*.md|tools/*|.husky/*|examples/*|weaver/samples/*) continue ;;
              *test*|*spec*) continue ;;
              # Exclude auto-generated code
              */generated/*) continue ;;
            esac

            # Source-code extension under packages/ or weaver/ → core
            case "$file" in
              packages/*|weaver/*)
                case "$file" in
                  *.js|*.mjs|*.ts|*.tsx|*.jsx|*.py|*.go|*.rs|*.kt|*.sol|*.java|*.cpp|*.c|*.h|*.cs|*.scala|*.rb)
                    HAS_CORE_CODE=true
                    ;;
                esac
                ;;
            esac

            # Dependency manifests — mark as changelog-worthy dep bump
            case "$file" in
              # go
              go.mod|go.sum|*/go.mod|*/go.sum) HAS_DEP_MANIFEST=true ;;
              # rust
              Cargo.toml|Cargo.lock|*/Cargo.toml|*/Cargo.lock) HAS_DEP_MANIFEST=true ;;
              # node
              package.json|package-lock.json|yarn.lock|pnpm-lock.yaml|*/package.json|*/package-lock.json|*/yarn.lock|*/pnpm-lock.yaml) HAS_DEP_MANIFEST=true ;;
              # docker
              Dockerfile|*.Dockerfile|*/Dockerfile) HAS_DEP_MANIFEST=true ;;
              # docker-compose
              docker-compose*.yml|docker-compose*.yaml|*/docker-compose*.yml|*/docker-compose*.yaml) HAS_DEP_MANIFEST=true ;;
              # github actions (workflow / composite action version pins)
              .github/workflows/*.yml|.github/workflows/*.yaml) HAS_DEP_MANIFEST=true ;;
              .github/actions/*/action.yml|.github/actions/*/action.yaml) HAS_DEP_MANIFEST=true ;;
              # java / kotlin / gradle / maven
              build.gradle|build.gradle.kts|settings.gradle|settings.gradle.kts|gradle.properties|constants.properties|versions.properties|libs.versions.toml|pom.xml) HAS_DEP_MANIFEST=true ;;
              */build.gradle|*/build.gradle.kts|*/settings.gradle|*/settings.gradle.kts|*/gradle.properties|*/constants.properties|*/versions.properties|*/libs.versions.toml|*/pom.xml) HAS_DEP_MANIFEST=true ;;
              gradle/wrapper/gradle-wrapper.properties|*/gradle/wrapper/gradle-wrapper.properties) HAS_DEP_MANIFEST=true ;;
            esac
          done < changed_files.txt

          echo "Detected PR Prefix Type:  '$PR_TYPE'"
          echo "Has Core Code Changes:    $HAS_CORE_CODE"
          echo "Has Dep Manifest Changes: $HAS_DEP_MANIFEST"

          in_set() { case " $2 " in *" $1 "*) return 0 ;; *) return 1 ;; esac; }

          if [ "$HAS_CORE_CODE" = true ]; then
            if in_set "$PR_TYPE" "$CHANGELOG_TYPES"; then
              echo "✅ Core change with changelog-eligible type '$PR_TYPE'."
              exit 0
            fi
            if in_set "$PR_TYPE" "$NON_CHANGELOG_TYPES"; then
              echo "❌ ERROR: PR includes source-code changes."
              echo "   Title must use one of: $CHANGELOG_TYPES"
              echo "   Detected: '$PR_TYPE'"
              exit 1
            fi
            echo "⚠️  Unrecognized type '$PR_TYPE' — leaving for reviewer to confirm."
            exit 0
          elif [ "$HAS_DEP_MANIFEST" = true ]; then
            if echo "$PR_TITLE" | grep -Eq '^build\(deps.*\):'; then
              echo "✅ Dependency bump with 'build(deps*)' scope."
              exit 0
            fi
            if in_set "$PR_TYPE" "$NON_CHANGELOG_TYPES"; then
              echo "✅ Dep manifest change with non-changelog type '$PR_TYPE'."
              exit 0
            fi
            echo "❌ ERROR: PR only touches dep manifests."
            echo "   Title must use 'build(deps):' scope or one of: $NON_CHANGELOG_TYPES"
            echo "   Detected: '$PR_TYPE'"
            exit 1
          else
            if in_set "$PR_TYPE" "$NON_CHANGELOG_TYPES"; then
              echo "✅ Non-core change with non-changelog type '$PR_TYPE'."
              exit 0
            fi
            if in_set "$PR_TYPE" "$CHANGELOG_TYPES"; then
              echo "❌ ERROR: PR contains no source-code changes."
              echo "   Title must use a non-changelog type: $NON_CHANGELOG_TYPES"
              echo "   Detected: '$PR_TYPE' (would pollute CHANGELOG)."
              exit 1
            fi
            echo "⚠️  Unrecognized type '$PR_TYPE' — leaving for reviewer to confirm."
            exit 0
          fi

  # Single rollup gate for the structural PR checks above. Branch protection
  # only needs to require THIS one context instead of `Commit Lint`,
  # `Validate PR title`, `Validate PR title match ...`, and `Validate PR Type`
  # individually. `if: always()` runs it even when a dependency fails; a
  # `skipped` dependency is treated as passing, only `failure`/`cancelled` fail.
  structural-checks-success:
    name: PR Structural Checks Success
    needs:
      - commitlint
      - validate-pr-title
      - validate-title-match
      - validate-type
    if: ${{ always() }}
    runs-on: ubuntu-22.04
    steps:
      - name: Fail if any structural check failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more structural PR checks failed or were cancelled:"
          echo '${{ toJSON(needs) }}'
          exit 1
      - name: All structural PR checks passed
        run: echo "All structural PR checks succeeded (skipped jobs are treated as passing)."
