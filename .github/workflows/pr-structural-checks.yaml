# Structural PR checks (commit lint, PR title/body validation) consolidated into
# a single workflow so branch protection can require ONE rollup gate
# (`PR Structural Checks Success`) instead of every individual structural
# context. The package/CI build check leaves stay individual on purpose — only
# these structural, PR-metadata checks are aggregated here.
#
# External app checks (DCO, dpulls, mergefreeze) are separate status contexts
# emitted by GitHub Apps and cannot be pulled into a workflow's `needs` graph;
# they remain standalone required checks.
name: "PR Structural Checks"

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read

jobs:
  commitlint:
    name: Commit Lint
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          fetch-depth: 0

      - name: Display commit messages with line details
        run: |
          echo "📝 Analyzing commit messages..."
          echo "================================"
          git log --format=%H origin/main..HEAD | while read -r hash; do
            echo ""
            echo "Commit: ${hash}"
            echo "--------------------------------"
            git log --format=%B -n 1 "${hash}" | awk '{printf "%3d [%3d chars] %s\n", NR, length($0), $0}'
            echo "--------------------------------"
          done

      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed #v6.2.1
        with:
          configFile: commitlint.config.mjs
          failOnWarnings: false
          failOnErrors: true
          helpURL: 'https://github.com/conventional-changelog/commitlint/#what-is-commitlint'
        env:
          VERBOSE: true

  validate-pr-title:
    name: Validate PR title
    runs-on: ubuntu-22.04
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 #v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  validate-title-match:
    name: Validate PR title match with latest commit message
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          fetch-depth: 1
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify PR Title Matches Latest Commit
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          LATEST_COMMIT_MSG=$(git log -1 --pretty=%s)

          echo "PR Title: '$PR_TITLE'"
          echo "Latest Commit Message: '$LATEST_COMMIT_MSG'"

          if [ "$PR_TITLE" != "$LATEST_COMMIT_MSG" ]; then
            echo "❌ ERROR: PR Title does not match your latest commit message!"
            echo "Your PR Title must match your Git commit message exactly."
            echo "To fix this, either rename your PR title on GitHub, or run:"
            echo "  git commit --amend -m \"$PR_TITLE\" && git push --force"
            exit 1
          fi
          echo "✅ PR Title matches the latest commit message."

  validate-type:
    name: Validate PR Type
    runs-on: ubuntu-latest
    steps:
      # Check out the linter script from the PR under test. (This is a commit
      # message lint, not a security gate, so running the PR's own copy is
      # acceptable; it also means the check works on the PR that adds/edits the
      # script, which a base-ref checkout could not.)
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          sparse-checkout: tools/commit-type-lint.sh
          sparse-checkout-cone-mode: false

      - name: Collect changed files
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # The list-PR-files API returns every changed filename and its patch;
          # --slurp merges all pages into one JSON array-of-arrays. This is the
          # only input the linter needs (no PR number/repo/token inside it).
          gh api --paginate --slurp \
            "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
            > pr_files.json

      - name: Validate PR type against changed files
        env:
          # PR title is passed via the environment (never interpolated into the
          # command) to avoid shell injection from a crafted title.
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: bash tools/commit-type-lint.sh --files pr_files.json

  # Single rollup gate for the structural PR checks above. Branch protection
  # only needs to require THIS one context instead of `Commit Lint`,
  # `Validate PR title`, `Validate PR title match ...`, and `Validate PR Type`
  # individually. `if: always()` runs it even when a dependency fails; a
  # `skipped` dependency is treated as passing, only `failure`/`cancelled` fail.
  structural-checks-success:
    name: PR Structural Checks Success
    needs:
      - commitlint
      - validate-pr-title
      - validate-title-match
      - validate-type
    if: ${{ always() }}
    runs-on: ubuntu-22.04
    steps:
      - name: Fail if any structural check failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more structural PR checks failed or were cancelled:"
          echo '${{ toJSON(needs) }}'
          exit 1
      - name: All structural PR checks passed
        run: echo "All structural PR checks succeeded (skipped jobs are treated as passing)."
