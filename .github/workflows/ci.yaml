name: Cacti CI
on:
  pull_request:
    branches:
      - main
      - dev

  workflow_dispatch:
    
  schedule:
    # Run at 8:00 AM UTC on weekends (Monday and Thursday)
    - cron: "0 8 * * 1,4" 

env:
  NODEJS_VERSION: v20.20.0
  RUN_TRIVY_SCAN: true
  RUN_CODE_COVERAGE: true
  NODE_OPTIONS: --max-old-space-size=8192

# Top-level cap for every reusable workflow called from this file.
# Must be >= the union of all transitively reachable job-level scopes.
# `contents: write` is required by `cpl-connector-besu` (connector-packages)
# and `cactus-cmd-api-server` (core-packages) because they push benchmark
# results to the gh-pages branch on main and write commit-comment alerts.
# `actions: read` is used by the benchmark cache restore.
# `checks: write` is used by dorny/test-reporter inside jest-runner.
permissions:
  contents: write
  actions: read
  checks: write

jobs:
  env-setup:
    outputs:
      node_version: ${{ steps.set-node-version.outputs.node_version }}
      run_code_coverage: ${{ steps.set-run-code-coverage.outputs.run_code_coverage }}
      run_trivy_scan: ${{ steps.set-run-trivy-scan.outputs.run_trivy_scan }}
    runs-on: ubuntu-22.04
    steps:
      - name: Set Node Version Output
        id: set-node-version
        run: echo "node_version=${{ env.NODEJS_VERSION }}" >> "$GITHUB_OUTPUT"
      - name: Set Run Code Coverage Output
        id: set-run-code-coverage
        run: echo "run_code_coverage=${{ env.RUN_CODE_COVERAGE }}" >> "$GITHUB_OUTPUT"
      - name: Set Run Trivy Scan Output
        id: set-run-trivy-scan
        run: echo "run_trivy_scan=${{ env.RUN_TRIVY_SCAN }}" >> "$GITHUB_OUTPUT"
      
  checks-and-build:
    needs: [env-setup]
    uses: ./.github/workflows/checks-and-build.yaml
    with:
      node_version: ${{ needs.env-setup.outputs.node_version }}
    
  code-quality-checks:
    needs: [checks-and-build, env-setup]
    uses: ./.github/workflows/code-quality-checks.yaml
    with:
      node_version: ${{ needs.env-setup.outputs.node_version }}
      
  packages-workflow:
    needs: [checks-and-build, env-setup]
    uses: ./.github/workflows/packages-workflow.yaml
    with:
      affected-packages: ${{ needs.checks-and-build.outputs.affected_packages }}
      node_version: ${{ needs.env-setup.outputs.node_version }}
      run_code_coverage: ${{ needs.env-setup.outputs.run_code_coverage }}
      run_trivy_scan: ${{ needs.env-setup.outputs.run_trivy_scan }}

  examples-workflow:
    needs: [checks-and-build, env-setup]
    uses: ./.github/workflows/examples-workflow.yaml
    with:
      affected-packages: ${{ needs.checks-and-build.outputs.affected_packages }}
      node_version: ${{ needs.env-setup.outputs.node_version }}
      run_code_coverage: ${{ needs.env-setup.outputs.run_code_coverage }}

  ghcr-workflow:
    needs: [checks-and-build, env-setup]
    uses: ./.github/workflows/ghcr-workflow.yaml
    with:
      node_version: ${{ needs.env-setup.outputs.node_version }}
      run_trivy_scan: ${{ needs.env-setup.outputs.run_trivy_scan }}
      affected-packages: ${{ needs.checks-and-build.outputs.affected_packages }}

  # Single rollup gate for the entire Cacti CI tree. Every leaf job above still
  # runs (and still shows up individually in the Checks tab), but branch
  # protection only needs to require THIS one check instead of dozens of
  # `packages-workflow / ...`, `checks-and-build / ...`, etc. contexts.
  #
  # `if: always()` makes this job run even when a dependency fails or is
  # skipped. A dependency that is `skipped` (e.g. a package gated out by the
  # affected-packages filter) is treated as passing; only `failure` or
  # `cancelled` fails the gate.
  #
  # `examples-workflow` and `ghcr-workflow` are intentionally NOT listed here:
  # they still run on every PR but are non-blocking, matching the pre-rollup
  # branch-protection policy. Add them back to `needs` to make them required.
  ci-success:
    name: Cacti CI Success
    needs:
      - env-setup
      - checks-and-build
      - code-quality-checks
      - packages-workflow
    if: ${{ always() }}
    runs-on: ubuntu-22.04
    steps:
      - name: Fail if any required job failed or was cancelled
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more Cacti CI jobs failed or were cancelled:"
          echo '${{ toJSON(needs) }}'
          exit 1
      - name: All Cacti CI jobs passed
        run: echo "All Cacti CI jobs succeeded (skipped jobs are treated as passing)."

