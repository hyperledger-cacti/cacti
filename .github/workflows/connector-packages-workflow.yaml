          jest_test_coverage_path: ${{ env.JEST_TEST_COVERAGE_PATH }}
          github_secret: ${{ secrets.GITHUB_TOKEN }}
          report_name: cpl-connector-fabric-v2-2-x-report

      - name: Upload coverage reports as artifacts
