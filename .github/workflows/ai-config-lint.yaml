name: "AI Config Lint"

on:
  pull_request:
    paths:
      - ".github/agents/**"
      - ".github/skills/**"
      - ".github/instructions/**"
      - "tools/ai-config-lint.mjs"

permissions:
  contents: read

jobs:
  lint-ai-config:
    name: Lint AI configuration
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version: "20"

      - name: Run AI config linter
        run: node tools/ai-config-lint.mjs
