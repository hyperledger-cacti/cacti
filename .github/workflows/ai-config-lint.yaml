name: "AI Config Lint"

on:
  pull_request:
    paths:
      - ".github/agents/**"
      - ".github/skills/**"
      - ".github/instructions/**"
      - "tools/ai-config-lint.mjs"

permissions:
  contents: read

jobs:
  lint-ai-config:
    name: Lint AI configuration
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 #v7.0.1

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 #v7.0.0
        with:
          node-version: "20"

      - name: Run AI config linter
        run: node tools/ai-config-lint.mjs
