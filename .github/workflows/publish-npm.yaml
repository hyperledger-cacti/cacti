name: publish-npm

env:
  NODEJS_VERSION: v20.20.0

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      GIT_TAG_TO_PUBLISH:
        description: 'The specific git tag to publish'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Check Version Format in Tag
        uses: nowsprinting/check-version-format-action@976544c127ab571b88419766cc9d3b459f8d7b82 #v5.0.1
        id: version
        with:
          prefix: 'v'

      - name: Fail if version is invalid
        if: steps.version.outputs.is_valid != 'true'
        run: |
          echo "Error: Tag '${{ github.ref_name }}' is not a valid semantic version."
          exit 1

      - name: Print Workflow inputs.GIT_TAG_TO_PUBLISH
        run: |
          echo "inputs.GIT_TAG_TO_PUBLISH=${{ inputs.GIT_TAG_TO_PUBLISH }}"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          ref: ${{ inputs.GIT_TAG_TO_PUBLISH }}

      - name: verify_lerna_version_matches_tag
        run: |
          LERNA_VERSION=$(jq -r '.version' lerna.json)
          REF_NAME="${{ inputs.GIT_TAG_TO_PUBLISH || github.ref_name }}"
          TAG_VERSION="${REF_NAME#v}"
          echo "lerna.json version: $LERNA_VERSION"
          echo "git tag (sans v):   $TAG_VERSION"
          if [ "$LERNA_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::lerna.json version ($LERNA_VERSION) does not match git tag ($TAG_VERSION)"
            exit 1
          fi

      - run: git fetch --unshallow --prune

      - run: git status --long --verbose

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version: ${{ env.NODEJS_VERSION }}

      - name: ./tools/ci.sh
        run: ./tools/ci.sh
        env:
          DEV_BUILD_DISABLED: false
          FULL_BUILD_DISABLED: false
          JEST_TEST_RUNNER_DISABLED: true
          TAPE_TEST_RUNNER_DISABLED: true

      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: |
            packages/cactus-*/dist
            packages/cacti-*/dist
            extensions/cactus-*/dist
            extensions/cacti-*/dist
            examples/cactus-*/dist
            examples/cacti-*/dist
            weaver/**/dist
            !**/node_modules/**
          retention-days: 1
          if-no-files-found: error

  publish-npmjs:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          ref: ${{ inputs.GIT_TAG_TO_PUBLISH }}

      - run: git fetch --unshallow --prune

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version: ${{ env.NODEJS_VERSION }}
          registry-url: "https://registry.npmjs.org/"
          scope: "@hyperledger-cacti"

      # OIDC trusted publishing needs npm >= 11.5.1 but Node v20 bundles npm 10.
      - name: Upgrade npm for OIDC trusted publishing
        run: |
          npm install -g npm@11
          npm --version

      - name: yarn install (workspace tooling for lerna)
        run: yarn install --immutable

      - name: Download build output
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: .

      - name: lerna-run-prepublishOnly
        run: yarn lerna run prepublishOnly --no-private --concurrency=1

      # Publishes with npm directly instead of lerna because lerna-lite v3 does
      # not support OIDC trusted publishing (that needs lerna-lite >= 4.9.0).
      # Authentication uses the npm trusted publisher configuration of each
      # package (no NPM_TOKEN secret) and provenance is attested automatically.
      # Already-published versions are skipped so the job is safe to re-run.
      - name: npm-publish-via-oidc
        run: |
          set -euo pipefail
          LERNA_VERSION=$(jq -r '.version' lerna.json)
          PRERELEASE_TAG=$(echo "$LERNA_VERSION" | sed -E -n 's/^[0-9]+\.[0-9]+\.[0-9]+-([a-zA-Z]+)(\..*)?$/\1/p')
          PUBLISH_ARGS=(--access=public --ignore-scripts)
          if [ -n "$PRERELEASE_TAG" ]; then
            PUBLISH_ARGS+=(--tag "$PRERELEASE_TAG")
            echo "Detected prerelease (${LERNA_VERSION}); using --tag ${PRERELEASE_TAG}"
          else
            echo "Stable release (${LERNA_VERSION}); npm will use default dist-tag"
          fi
          yarn lerna list --json > /tmp/cacti-packages.json
          jq -r '.[] | select(.private == false) | .location' /tmp/cacti-packages.json \
          | while read -r pkg_dir; do
              pkg_name=$(jq -r '.name' "${pkg_dir}/package.json")
              pkg_version=$(jq -r '.version' "${pkg_dir}/package.json")
              if npm view "${pkg_name}@${pkg_version}" version >/dev/null 2>&1; then
                echo "SKIP: ${pkg_name}@${pkg_version} already on registry"
                continue
              fi
              echo "PUBLISH: ${pkg_name}@${pkg_version}"
              npm publish "${pkg_dir}" "${PUBLISH_ARGS[@]}"
            done

  publish-ghcr:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          ref: ${{ inputs.GIT_TAG_TO_PUBLISH }}

      - run: git fetch --unshallow --prune

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          always-auth: true
          node-version: ${{ env.NODEJS_VERSION }}
          registry-url: "https://npm.pkg.github.com/"
          scope: "@${{ github.repository_owner }}"

      - run: cat /home/runner/work/_temp/.npmrc

      - name: yarn install (workspace tooling for lerna)
        run: yarn install --immutable

      - run: cat /home/runner/work/_temp/.npmrc

      - name: Download build output
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: .

      - name: Check npm whoami with no --registry parameter.
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm whoami

      - name: Check npm whoami with --registry set to GHCR
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm whoami --registry=https://npm.pkg.github.com/

      - name: Configure git user and email
        run: |
          git config --global user.email "npm-ci@${{ github.repository_owner }}.org"
          git config --global user.name "hyperledger-ghci"

      - name: lerna-run-prepublishOnly
        run: yarn lerna run prepublishOnly --no-private --concurrency=1

      - name: lerna-publish-ghcr
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          yarn lerna publish from-git --yes --ignore-scripts --loglevel=debug

  publish-example-carbon-accounting-image:
    needs: [publish-npmjs, publish-ghcr]
    runs-on: ubuntu-22.04
    permissions:
      packages: write
      contents: read
    env:
      DOCKER_BUILDKIT: 1
      IMAGE_NAME: cactus-example-carbon-accounting
      DOCKERFILE_PATH: ./examples/carbon-accounting/Dockerfile
      DOCKER_BUILD_DIR: ./
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
        with:
          ref: ${{ inputs.GIT_TAG_TO_PUBLISH }}

      - name: Wait for npm CDN propagation
        run: sleep 30

      - name: Build image
        run: docker build "$DOCKER_BUILD_DIR" --file "$DOCKERFILE_PATH" --tag "$IMAGE_NAME" --label "runnumber=${GITHUB_RUN_ID}"

      - name: Log in to registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: |
          SHORTHASH=$(git rev-parse --short "$GITHUB_SHA")
          TODAYS_DATE="$(date +%F)"
          DOCKER_TAG="$TODAYS_DATE-$SHORTHASH"
          IMAGE_ID="ghcr.io/${{ github.repository_owner }}/$IMAGE_NAME"
          IMAGE_ID=$(echo "$IMAGE_ID" | tr '[:upper:]' '[:lower:]')
          REF_NAME="${{ inputs.GIT_TAG_TO_PUBLISH || github.ref_name }}"
          VERSION="${REF_NAME#v}"
          [ "$VERSION" == "main" ] && VERSION=$DOCKER_TAG
          echo IMAGE_ID="$IMAGE_ID"
          echo VERSION="$VERSION"
          docker tag "$IMAGE_NAME" "$IMAGE_ID:$VERSION"
          docker push "$IMAGE_ID:$VERSION"

  cleanup:
    needs: [publish-npmjs, publish-ghcr]
    if: always()
    runs-on: ubuntu-22.04
    permissions:
      actions: write
    steps:
      - name: Delete build-output artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --jq '.artifacts[] | select(.name=="build-output") | .id' \
          | xargs -rI{} gh api -X DELETE \
              repos/${{ github.repository }}/actions/artifacts/{}
