name: SATP Hermes Gateway - Docker Publish

# =============================================================================
# DOCKER PUBLISHING WORKFLOW
# =============================================================================
#
# This workflow builds and publishes the SATP Hermes Gateway Docker image to
# GitHub Container Registry (GHCR) and Docker Hub.
#
# PUBLISHING POLICY:
#   GHCR:       Every qualifying build — branch pushes (main, satp-dev,
#               satp-stg), release tags, and manual workflow_dispatch.
#               Dev builds are tagged {base-version}-dev.{sha}; releases
#               are tagged with the version and the moving tag ('latest'
#               for stable, 'rc' for release candidates).
#   Docker Hub: Release builds ONLY (git tag pushes vX.Y.Z, or manual
#               workflow_dispatch with is_release=true). Tagged with the
#               version and the moving tag ('latest' for stable, 'rc' for
#               release candidates). No dev builds are pushed to Docker Hub.
#
# IMAGE CONFIGURATION:
#   GHCR:       ghcr.io/hyperledger-cacti/cacti-satp-hermes-gateway
#   Docker Hub: hyperledger/cacti-satp-hermes-gateway
#
# VERSION STRATEGY:
#   Version Source: package.json version (single source of truth)
#
#   Development Builds:
#     Format: {YYYY-MM-DD}-dev-{hash}
#     Trigger: Push to main, satp-dev, or satp-stg branches
#
#   Release Builds:
#     Format: {base-version} or custom version
#     GHCR/Hub Tags: latest + version tag
#     Trigger: Manual workflow_dispatch with is_release=true
#
# REQUIRED SECRETS:
#   GITHUB_TOKEN:    Auto-provided for GHCR publishing
#   DOCKERHUB_USERNAME: Docker Hub login account (bot user with push access to
#                       the 'hyperledger' org; distinct from the org namespace)
#   DOCKERHUB_PAT:      Docker Hub personal access token (for DOCKERHUB_USERNAME)
#
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip test execution (for emergency releases only)'
        required: false
        default: false
        type: boolean
      is_release:
        description: 'Create release version using package.json version'
        required: false
        default: false
        type: boolean
      custom_version:
        description: 'Custom version tag (leave empty to use package.json version)'
        required: false
        type: string

  workflow_call:
    inputs:
      skip_tests:
        description: 'Skip test execution (for emergency releases only)'
        required: false
        default: false
        type: boolean
      is_release:
        description: 'Create release version using package.json version'
        required: false
        default: false
        type: boolean
      custom_version:
        description: 'Custom version tag (leave empty to use package.json version)'
        required: false
        type: string
    outputs:
      package_version:
        description: "Package version from package.json"
        value: ${{ jobs.set-docker-tags.outputs.package_version }}
      tag_suffix:
        description: "Tag suffix (dev or release)"
        value: ${{ jobs.set-docker-tags.outputs.tag_suffix }}
      tag_version:
        description: "Full tag version"
        value: ${{ jobs.set-docker-tags.outputs.tag_version }}
      moving_tag:
        description: "Moving tag to publish (latest, rc, or empty)"
        value: ${{ jobs.set-docker-tags.outputs.moving_tag }}
      dockerhub_image:
        description: "Docker Hub image name"
        value: ${{ jobs.set-docker-tags.outputs.dockerhub_image }}
      ghcr_image:
        description: "GHCR image name"
        value: ${{ jobs.set-docker-tags.outputs.ghcr_image }}
      is_release:
        description: "Whether this is a release build"
        value: ${{ jobs.set-docker-tags.outputs.is_release }}

concurrency:
  group: satp-hermes-docker-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Image namespace is the 'hyperledger' Docker Hub org. Note this is NOT the
  # login account: the push authenticates as secrets.DOCKERHUB_USERNAME (a bot
  # account that is a member of the org), which differs from the org namespace.
  DOCKERHUB_IMAGE: hyperledger/cacti-satp-hermes-gateway
  GHCR_IMAGE: hyperledger-cacti/cacti-satp-hermes-gateway

jobs:
  # Set Docker tags based on branch and commit information
  set-docker-tags:
    # Handle conditional test dependencies - run if tests pass OR if tests are skipped in release mode
    if: |
      always() && (
        (inputs.skip_tests == true && inputs.is_release == true) ||
        (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/satp-dev' || github.ref == 'refs/heads/satp-stg' || startsWith(github.ref, 'refs/tags/'))) ||
        (github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'satp-dev' || github.base_ref == 'satp-stg')) ||
        github.event_name == 'workflow_dispatch'
      )
    runs-on: ubuntu-22.04
    outputs:
      package_version: ${{ steps.set_tags.outputs.package_version }}
      tag_suffix: ${{ steps.set_tags.outputs.tag_suffix }}
      tag_version: ${{ steps.set_tags.outputs.tag_version }}
      moving_tag: ${{ steps.set_tags.outputs.moving_tag }}
      dockerhub_image: ${{ steps.set_tags.outputs.dockerhub_image }}
      ghcr_image: ${{ steps.set_tags.outputs.ghcr_image }}
      is_release: ${{ steps.set_tags.outputs.is_release }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
      - name: Set image tags
        id: set_tags
        run: |
          # Base version from package.json (used only for dev/staging builds).
          PACKAGE_VERSION=$(node -e "console.log(require('./packages/cactus-plugin-satp-hermes/package.json').version)")
          SHORT_SHA="$(git rev-parse --short HEAD)"

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            # Production release: the pushed version tag (vX.Y.Z) is the source of truth.
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            TAG_SUFFIX="release"
            IS_RELEASE="true"
            # Release candidates go to the 'rc' channel; final releases move 'latest'.
            case "$TAG_VERSION" in
              *-rc*) MOVING_TAG="rc" ;;
              *)     MOVING_TAG="latest" ;;
            esac
            echo "Building production release ${TAG_VERSION} (moving tag: ${MOVING_TAG})"
          else
            # Dev build from a branch commit (main, satp-dev, or satp-stg).
            # No moving tag is published.
            IS_RELEASE="false"
            MOVING_TAG=""
            TAG_SUFFIX="dev"
            TAG_VERSION="${PACKAGE_VERSION}-${TAG_SUFFIX}.${SHORT_SHA}"
            echo "Building ${TAG_SUFFIX} version: ${TAG_VERSION}"
          fi

          {
            echo "package_version=${PACKAGE_VERSION}"
            echo "tag_suffix=${TAG_SUFFIX}"
            echo "tag_version=${TAG_VERSION}"
            echo "moving_tag=${MOVING_TAG}"
            echo "dockerhub_image=${DOCKERHUB_IMAGE}"
            echo "ghcr_image=${GHCR_IMAGE}"
            echo "is_release=${IS_RELEASE:-false}"
          } >> "$GITHUB_OUTPUT"

      - name: Debug Build Info
        run: |
          PACKAGE_VERSION=$(node -e "console.log(require('./packages/cactus-plugin-satp-hermes/package.json').version)")
          {
            echo "Debug: Current ref = ${{ github.ref }}"
            echo "Debug: Event name = ${{ github.event_name }}"
            echo "Debug: GitHub workspace = ${{ github.workspace }}"
            echo "Debug: Repository = ${{ github.repository }}"
            echo "Debug: Building for tag version = ${{ steps.set_tags.outputs.tag_version }}"
            echo "Debug: Building for dockerhub image = ${{ steps.set_tags.outputs.dockerhub_image }}"
            echo "Debug: Node.js version = v22.18.0"
            echo "Debug: Package version = ${PACKAGE_VERSION}"
            echo "Debug: Commit hash = $(git rev-parse --short HEAD)"
          }

  # Build Docker image once for caching and reuse by push jobs
  build-satp-docker:
    needs: [set-docker-tags]
    # Build Docker images for pushes, PRs targeting the release branches, release tags, and manual workflow dispatch.
    # This job only builds, it does not push to registries.
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/satp-dev' || github.ref == 'refs/heads/satp-stg' || startsWith(github.ref, 'refs/tags/'))) || (github.event_name == 'pull_request' && (github.base_ref == 'main' || github.base_ref == 'satp-dev' || github.base_ref == 'satp-stg')) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4.0
        with:
          node-version: 'v20.20.0'
          cache: 'yarn'
          cache-dependency-path: yarn.lock
      
      - id: yarn-cache
        name: Initialize Yarn Cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 #v6.1.0
        with:
          key: ${{ runner.os }}-yarn-${{ hashFiles('./yarn.lock') }}
          path: ./.yarn/
          restore-keys: |
            ${{ runner.os }}-yarn-${{ hashFiles('./yarn.lock') }}

      - name: Set working directory
        run: cd packages/cactus-plugin-satp-hermes           

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a #v1.9.0
        with:
          version: stable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Configure
        run: yarn configure

      - name: Build bundle
        id: build
        run: |
          yarn lerna run build:bundle --scope=@hyperledger-cacti/cactus-plugin-satp-hermes
          echo "success=true" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c #v4.2.0

      - name: Build Docker image (load into local daemon, no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a #v7.3.0
        with:
          context: ./packages/cactus-plugin-satp-hermes
          file: ./packages/cactus-plugin-satp-hermes/satp-hermes-gateway.Dockerfile
          # Build once and load into the local Docker daemon so the image can be
          # exported as an artifact and reused by the publish jobs (no rebuild).
          load: true
          push: false
          tags: |
            satp-hermes-gateway:${{ needs.set-docker-tags.outputs.tag_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image to tarball
        run: |
          docker save "satp-hermes-gateway:${{ needs.set-docker-tags.outputs.tag_version }}" \
            -o /tmp/satp-hermes-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: satp-hermes-docker-image
          path: /tmp/satp-hermes-image.tar
          retention-days: 1

  # =============================================================================
  # STAGE 7: PUBLISH DOCKER IMAGES
  # =============================================================================
  # The following two jobs run in parallel. Both download the pre-built image
  # artifact produced by build-satp-docker, load it into the local Docker
  # daemon, then tag and push it to their respective registries. This avoids
  # rebuilding the bundle and Docker image a second (and third) time.

  # Stage 7a: Publish Docker image to GitHub Container Registry (GHCR)
  publish-satp-image-ghcr:
    needs: [build-satp-docker, set-docker-tags]
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/satp-dev' || github.ref == 'refs/heads/satp-stg' || startsWith(github.ref, 'refs/tags/'))) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: write # push image to GHCR
    # Production publishes run under the `prod` environment so maintainers can
    # gate them with required reviewers / scoped secrets; dev builds use none.
    environment: ${{ needs.set-docker-tags.outputs.is_release == 'true' && 'prod' || '' }}
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          name: satp-hermes-docker-image
          path: /tmp

      - name: Load image into local daemon
        run: docker load -i /tmp/satp-hermes-image.tar

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 #v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push to GHCR
        run: |
          LOCAL="satp-hermes-gateway:${{ needs.set-docker-tags.outputs.tag_version }}"
          IMAGE="ghcr.io/${{ needs.set-docker-tags.outputs.ghcr_image }}"
          MOVING="${{ needs.set-docker-tags.outputs.moving_tag }}"
          docker tag "$LOCAL" "$IMAGE:${{ needs.set-docker-tags.outputs.tag_version }}"
          docker push "$IMAGE:${{ needs.set-docker-tags.outputs.tag_version }}"
          # Production releases also publish a moving tag ('latest' or 'rc').
          if [ -n "$MOVING" ]; then
            docker tag "$LOCAL" "$IMAGE:$MOVING"
            docker push "$IMAGE:$MOVING"
          fi

  # Stage 7b: Publish Docker image to Docker Hub (release builds only)
  # Dev builds are not pushed to Docker Hub — only GHCR receives dev images.
  publish-satp-image-dockerhub:
    needs: [build-satp-docker, set-docker-tags]
    if: needs.set-docker-tags.outputs.is_release == 'true'
    runs-on: ubuntu-22.04
    continue-on-error: true  # Don't fail the workflow if Docker Hub push fails
    # Production publishes run under the `prod` environment.
    environment: prod
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #v8.0.1
        with:
          name: satp-hermes-docker-image
          path: /tmp

      - name: Load image into local daemon
        run: docker load -i /tmp/satp-hermes-image.tar

      - name: Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 #v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Tag and push to Docker Hub
        run: |
          LOCAL="satp-hermes-gateway:${{ needs.set-docker-tags.outputs.tag_version }}"
          IMAGE="${{ needs.set-docker-tags.outputs.dockerhub_image }}"
          MOVING="${{ needs.set-docker-tags.outputs.moving_tag }}"
          docker tag "$LOCAL" "$IMAGE:${{ needs.set-docker-tags.outputs.tag_version }}"
          docker push "$IMAGE:${{ needs.set-docker-tags.outputs.tag_version }}"
          # Production releases also publish a moving tag ('latest' or 'rc').
          if [ -n "$MOVING" ]; then
            docker tag "$LOCAL" "$IMAGE:$MOVING"
            docker push "$IMAGE:$MOVING"
          fi

