name: Deploy Corda Packages

env:
  DOCKER_REGISTRY: ghcr.io/${{ github.repository_owner }}

on:
  push:
    tags:
      - v*
      
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  publish-protos-java-kt:
    runs-on: ubuntu-22.04
    permissions:
      packages: write
      contents: read

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
      
      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 #v5.4.0
        with:
          java-version: '17'
          distribution: 'adopt'
          
      - name: Generate github.properties
        run: |
          echo "Using ${GITHUB_ACTOR} user."
          {
            echo "username=${GITHUB_ACTOR}"
            echo "password=${{ secrets.GITHUB_TOKEN }}"
            echo "url=https://maven.pkg.github.com/${GITHUB_REPOSITORY_OWNER}/cacti"
          } >> github.properties
          cat github.properties
        working-directory: weaver/common/protos-java-kt

      - name: Check if already published on GitHub Packages
        id: check
        working-directory: weaver/common/protos-java-kt
        run: |
          ART=protos-java-kt
          GROUP=$(grep -oE '^group=.*' gradle.properties | cut -d= -f2-)
          VER=$(grep -oE '^version=.*' gradle.properties | cut -d= -f2-)
          GROUP_PATH=$(echo "$GROUP" | tr . /)
          URL="https://maven.pkg.github.com/${{ github.repository_owner }}/cacti/$GROUP_PATH/$ART/$VER/$ART-$VER.pom"
          HTTP=$(curl -sSL -o /dev/null -w "%{http_code}" \
            -u "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" "$URL")
          echo "GET $URL -> $HTTP"
          if [ "$HTTP" = "200" ]; then
            echo "$ART:$VER already on GitHub Packages — skipping publish"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "$ART:$VER not yet published — will publish"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish
        if: steps.check.outputs.skip != 'true'
        run: make publish
        working-directory: weaver/common/protos-java-kt
        

  publish-interop-app:
    if: always()
    needs: publish-protos-java-kt
    runs-on: ubuntu-22.04
    permissions:
      packages: write
      contents: read

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
      
      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 #v5.4.0
        with:
          java-version: '17'
          distribution: 'adopt'
          
      - name: Generate github.properties
        run: |
          echo "Using ${GITHUB_ACTOR} user."
          {
            echo "username=${GITHUB_ACTOR}"
            echo "password=${{ secrets.GITHUB_TOKEN }}"
            echo "url=https://maven.pkg.github.com/${GITHUB_REPOSITORY_OWNER}/cacti"
          } >> github.properties
          cat github.properties
        working-directory: weaver/core/network/corda-interop-app
        
      - name: Check if already published on GitHub Packages
        id: check
        working-directory: weaver/core/network/corda-interop-app
        run: |
          GROUP=org.hyperledger.cacti.weaver.imodule.corda
          VER=$(grep -oE '^version=.*' gradle.properties | cut -d= -f2-)
          GROUP_PATH=$(echo "$GROUP" | tr . /)
          ALL_PUBLISHED=true
          for ART in interop-contracts interop-workflows; do
            URL="https://maven.pkg.github.com/${{ github.repository_owner }}/cacti/$GROUP_PATH/$ART/$VER/$ART-$VER.pom"
            HTTP=$(curl -sSL -o /dev/null -w "%{http_code}" \
              -u "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" "$URL")
            echo "GET $URL -> $HTTP"
            if [ "$HTTP" != "200" ]; then
              ALL_PUBLISHED=false
            fi
          done
          if [ "$ALL_PUBLISHED" = "true" ]; then
            echo "interop-contracts & interop-workflows @ $VER already on GitHub Packages — skipping publish"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "At least one artifact not yet published — will publish"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: steps.check.outputs.skip != 'true'
        run: make build
        working-directory: weaver/core/network/corda-interop-app

      - name: Publish
        if: steps.check.outputs.skip != 'true'
        run: make publish
        working-directory: weaver/core/network/corda-interop-app
        
  publish-sdk:
    if: always()
    needs: [publish-protos-java-kt, publish-interop-app]
    runs-on: ubuntu-22.04
    permissions:
      packages: write
      contents: read

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
      
      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 #v5.4.0
        with:
          java-version: '17'
          distribution: 'adopt'
          
      - name: Generate github.properties
        run: |
          echo "Using ${GITHUB_ACTOR} user."
          {
            echo "username=${GITHUB_ACTOR}"
            echo "password=${{ secrets.GITHUB_TOKEN }}"
            echo "url=https://maven.pkg.github.com/${GITHUB_REPOSITORY_OWNER}/cacti"
          } >> github.properties
          cat github.properties
        working-directory: weaver/sdks/corda
        
      - name: Check if already published on GitHub Packages
        id: check
        working-directory: weaver/sdks/corda
        run: |
          ART=weaver-sdk-corda
          GROUP=$(grep -oE '^group=.*' gradle.properties | cut -d= -f2-)
          VER=$(grep -oE '^version=.*' gradle.properties | cut -d= -f2-)
          GROUP_PATH=$(echo "$GROUP" | tr . /)
          URL="https://maven.pkg.github.com/${{ github.repository_owner }}/cacti/$GROUP_PATH/$ART/$VER/$ART-$VER.pom"
          HTTP=$(curl -sSL -o /dev/null -w "%{http_code}" \
            -u "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" "$URL")
          echo "GET $URL -> $HTTP"
          if [ "$HTTP" = "200" ]; then
            echo "$ART:$VER already on GitHub Packages — skipping publish"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "$ART:$VER not yet published — will publish"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: steps.check.outputs.skip != 'true'
        run: make build
        working-directory: weaver/sdks/corda

      - name: Publish
        if: steps.check.outputs.skip != 'true'
        run: make publish
        working-directory: weaver/sdks/corda
    
  publish-driver-image:
    if: always()
    needs: [publish-protos-java-kt, publish-interop-app, publish-sdk]
    runs-on: ubuntu-22.04
    permissions:
      packages: write
      contents: read

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 #v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Generate github.properties
        run: |
          echo "Using ${GITHUB_ACTOR} user."
          {
            echo "username=${GITHUB_ACTOR}"
            echo "password=${{ secrets.GITHUB_TOKEN }}"
            echo "url=https://maven.pkg.github.com/${GITHUB_REPOSITORY_OWNER}/cacti"
          } >> github.properties
          cat github.properties
        working-directory: weaver/core/drivers/corda-driver

      - name: Check if package already exists
        run: (make check-if-tag-exists DOCKER_REGISTRY=${DOCKER_REGISTRY} && echo "CORDA_DRIVER_PUSH=true" >> $GITHUB_ENV) || echo "CORDA_DRIVER_PUSH=false" >> $GITHUB_ENV
        working-directory: weaver/core/drivers/corda-driver
          
      - name: Build and Push
        if: ${{ env.CORDA_DRIVER_PUSH == 'true' }}
        run: make push-image DOCKER_REGISTRY=${DOCKER_REGISTRY}
        working-directory: weaver/core/drivers/corda-driver
        
      - name: Push latest tag
        if: ${{ env.CORDA_DRIVER_PUSH == 'true' }}
        run: make push-image-latest DOCKER_REGISTRY=${DOCKER_REGISTRY}
        working-directory: weaver/core/drivers/corda-driver
